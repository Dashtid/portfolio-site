# fly.toml app configuration file generated for dashti-portfolio-backend on 2025-10-28T21:17:28+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'dashti-portfolio-backend'
primary_region = 'arn'

[build]
  dockerfile = 'Dockerfile'

# Runs in a one-off VM with the new image + production secrets before the
# release is promoted. If it exits non-zero the deploy aborts and the old
# machines keep serving, so a broken migration can't take prod down.
# scripts/migrate.py wraps alembic: fresh DBs get create_all + stamp head
# (the raw `alembic upgrade head` crashed on empty schemas), existing DBs
# get a normal upgrade.
[deploy]
  release_command = 'python -m scripts.migrate'

[env]
  ENVIRONMENT = 'production'
  LOG_LEVEL = 'INFO'
  PORT = '8000'
  # Admin-uploaded PDFs go on the persistent volume, not the ephemeral
  # rootfs — before this, every deploy wiped uploads.
  # NOTE: DATABASE_URL deliberately does NOT appear here. Production runs
  # on the dashti-portfolio-db Postgres app via the DATABASE_URL secret;
  # the SQLite pin that used to live here was dead config masked by the
  # secret, and if the secret ever vanished the app would silently boot
  # an empty SQLite DB. config.py now refuses sqlite in production, so a
  # missing secret fails the deploy loudly instead.
  UPLOAD_DIR = '/data/uploads/documents'

[[mounts]]
  source = 'portfolio_data'
  destination = '/data'
  initial_size = '1GB'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

  # /health/ready does SELECT 1 against the DB and returns 503 when it
  # fails. The previous shallow /health never touched the DB, which is
  # why a 21-hour Postgres outage (June 2026) stayed invisible: the app
  # kept answering 200 while every data endpoint returned 500.
  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/api/v1/health/ready'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1

[[statics]]
  guest_path = '/app/static'
  url_prefix = '/static'
