name: CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  merge_group:
    branches: [main, master]

# Default-minimum permissions; jobs that need more (PR coverage comments,
# SARIF upload) raise their own at the job level. See OpenSSF Scorecard
# Token-Permissions check.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  PYTHON_VERSION: '3.13'
  NODE_VERSION: '24'

jobs:
  # Detect which paths changed
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - 'package*.json'
            backend:
              - 'backend/**'
              - 'requirements*.txt'

  # Frontend Quality Checks
  frontend-quality:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'merge_group'
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write # for the vitest coverage PR comment
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npm run --if-present lint

      - name: Run type check
        run: npm run type-check

      - name: Run unit tests
        run: npm test -- --run --coverage

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        # Reporting nicety must never block the gate (D3-CI-01): a missing
        # summary file killed every frontend PR before Codecov/SSG/artifact.
        continue-on-error: true
        uses: davelosert/vitest-coverage-report-action@3c50566c523e04813df28de8f7c48dd97d663f1c # v2
        with:
          working-directory: ./frontend
          # vitest writes to .coverage/ (vitest.config.ts:33), not coverage/.
          # vite-config-path would also work but reading vite.config.ts gives
          # a stale value -- pass the JSON paths explicitly.
          json-summary-path: .coverage/coverage-summary.json
          json-final-path: .coverage/coverage-final.json

      - name: Upload coverage to Codecov
        # vitest writes to .coverage/ (per frontend/vitest.config.ts:33),
        # not coverage/ — keep these in sync if the directory ever moves.
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          files: ./frontend/.coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false

      - name: Build frontend (SSG)
        run: npm run build:ssg

      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  # Backend Quality Checks
  backend-quality:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'merge_group'
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write # for the pytest coverage PR comment
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/requirements*.txt

      - name: Install dependencies
        # Pip itself is version-pinned so the bootstrap doesn't drift with
        # the runner image. Application deps come from the SHA-pinned
        # requirements files (see backend/scripts/compile-requirements.sh).
        run: |
          python -m pip install --upgrade 'pip==26.1.1'
          pip install --require-hashes -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint with ruff
        run: |
          ruff check .
          ruff format --check .

      - name: Run tests
        run: pytest tests/ -v --cov=app --cov-report=xml --cov-report=term --junitxml=pytest-report.xml
        env:
          # SECRET_KEY has no default and the Settings validator rejects None
          # (security-by-design). A throwaway CI value satisfies the validator;
          # it never decrypts real data — tests use a separate test DB.
          SECRET_KEY: test-secret-key-for-ci

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: MishaKav/pytest-coverage-comment@287292879eaaff04116f36d3eb1a670f6e5df1a4 # v1.7.1
        with:
          pytest-xml-coverage-path: ./backend/coverage.xml
          junitxml-path: ./backend/pytest-report.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          files: ./backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

  # E2E Testing with Playwright — runs on PRs and pushes to main.
  # Intentionally does NOT depend on backend-quality: the SSG build fetches the
  # prod API at build time and never touches a local backend, so making it a
  # dependency only caused e2e to be skipped on frontend-only changes (a skipped
  # `needs` job cascades a skip to the dependent).
  e2e-tests:
    runs-on: ubuntu-latest
    needs: [changes, frontend-quality]
    if: |
      (github.event_name == 'pull_request' ||
       (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'))) &&
      needs.changes.outputs.frontend == 'true'
    timeout-minutes: 15
    container:
      # Keep in lockstep with the pinned @playwright/test version in frontend/package.json
      # (and the test:e2e:*-docker scripts there) — a mismatch means the container's
      # bundled browsers don't match the installed client and Playwright refuses to run.
      image: mcr.microsoft.com/playwright:v1.60.0-noble
      options: --ipc=host
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install dependencies
        run: npm ci

      - name: Download frontend-dist artifact (built by frontend-quality)
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Run Playwright E2E tests
        # webServer in playwright.config.ts skips `build:ssg` when CI=true and
        # just runs `vite preview` against the downloaded dist/.
        #
        # Visual Regression re-enabled 2026-07-05 (design campaign D4):
        # baselines regenerated in the Playwright Docker image against the
        # post-D1-D4 design. To rebaseline after intentional visual changes
        # see the update-docker script (on Windows run it from Git Bash with
        # a node_modules shadow volume — npm's cmd.exe shell can't expand
        # $(pwd)).
        #
        # D3-CI-03: the --grep-invert "Bundle Size|defer non-critical"
        # exclusion is gone — those tests were deleted outright (Lighthouse
        # owns the budgets as hard errors), so the full suite runs.
        run: npx playwright test --project=chromium
        env:
          HOME: /root

      - name: Upload Playwright test results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/.playwright-report/
          retention-days: 3

      - name: Upload Playwright videos
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: failure()
        with:
          name: playwright-videos
          path: frontend/.test-results/
          retention-days: 3

  # Security Scanning
  security-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install Trivy CLI
        # Avoids aquasecurity/trivy-action which had a supply chain compromise in March 2026
        # (75 of 76 version tags force-pushed to serve malicious payloads)
        # Direct binary download from GitHub Releases is unaffected.
        env:
          TRIVY_VERSION: '0.70.0'
        run: |
          BASE_URL="https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}"
          ARCHIVE="trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          CHECKSUMS="trivy_${TRIVY_VERSION}_checksums.txt"
          # Keep the on-disk names identical to the asset names so the checksum
          # line from Aqua's published list matches what sha256sum --check looks for.
          curl -sSfL "${BASE_URL}/${ARCHIVE}" -o "${ARCHIVE}"
          curl -sSfL "${BASE_URL}/${CHECKSUMS}" -o "${CHECKSUMS}"
          # Verify the archive checksum against Aqua's published list before extracting
          grep " ${ARCHIVE}\$" "${CHECKSUMS}" | sha256sum --check
          tar -xzf "${ARCHIVE}" trivy
          sudo mv trivy /usr/local/bin/trivy
          rm "${ARCHIVE}" "${CHECKSUMS}"

      - name: Run Trivy vulnerability scanner
        run: |
          trivy fs --severity CRITICAL,HIGH --format sarif --output trivy-results.sarif .

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@d4b3ca9fa7f69d38bfcd667bdc45bc373d16277e # v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Check for secrets
        uses: trufflesecurity/trufflehog@ef6e76c3c4023279497fab4721ffa071a722fd05 # v3.92.4
        with:
          path: ./
          base: ${{ github.event.before }}
          head: ${{ github.sha }}
          extra_args: --only-verified

  # Dependency Review - blocks PRs with vulnerable dependencies
  dependency-review:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write # the action posts a summary comment on the PR
    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          deny-licenses: GPL-3.0, AGPL-3.0

  # Lighthouse Performance Audit
  lighthouse:
    runs-on: ubuntu-latest
    needs: [changes, frontend-quality]
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'merge_group'
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend (SSG)
        working-directory: ./frontend
        run: npm run build:ssg

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@512cc908a55bfb0ad231facca52adf3d3a651df4 # v12
        with:
          configPath: './.github/lighthouse/lighthouserc.json'
          temporaryPublicStorage: true
          uploadArtifacts: true
          runs: 3

  # Deploy frontend to Vercel — gated on frontend-quality, e2e-tests, and
  # lighthouse all succeeding. Vercel builds the bundle itself from source
  # (vercel.json's buildCommand), so we don't need to ship the dist artifact —
  # we just trigger the deploy via CLI.
  deploy-frontend:
    runs-on: ubuntu-latest
    needs: [changes, frontend-quality, e2e-tests, lighthouse]
    if: |
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      needs.changes.outputs.frontend == 'true' &&
      needs.frontend-quality.result == 'success' &&
      needs.e2e-tests.result == 'success' &&
      needs.lighthouse.result == 'success'
    timeout-minutes: 10
    environment:
      name: production
      url: https://dashti.se

    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        # Pinned (not @latest) but kept current — Vercel rejects deploys from
        # CLI versions below a server-side minimum (44.x started 400ing with
        # "requires version 47.2.2 or later").
        run: npm install -g vercel@53.4.0

      - name: Deploy to Vercel
        # The Vercel CLI does not authenticate from the VERCEL_TOKEN env var on
        # its own ("No existing credentials found ... pass --token") — the token
        # has to be passed explicitly. VERCEL_ORG_ID/PROJECT_ID are still read
        # from the environment to select the project without a linked .vercel dir.
        #
        # --build-env (D3-INF-03): the build runs on Vercel's infra, so CI env
        # vars don't reach it unless forwarded. VITE_APP_VERSION gives Sentry a
        # real release tag (was 0.0.0 on every event). The SENTRY_* trio powers
        # sourcemap upload; while those secrets are unset the empty values
        # simply leave the upload plugin disabled (vite.config.ts gates on it).
        # VITE_SENTRY_DSN: discovered 2026-07-17 that the DSN was never set in
        # Vercel's build env — the DSN guard in sentry.ts dead-codes the ENTIRE
        # Sentry init at build, so frontend Sentry has never been active in
        # production. Set the VITE_SENTRY_DSN secret to activate it (a DSN is
        # client-visible by design; secret storage is just tidier than inline).
        run: |
          vercel deploy --prod --yes \
            --build-env VITE_APP_VERSION="${GITHUB_SHA:0:12}" \
            --build-env VITE_SENTRY_DSN="$VITE_SENTRY_DSN" \
            --build-env SENTRY_AUTH_TOKEN="$SENTRY_AUTH_TOKEN" \
            --build-env SENTRY_ORG="$SENTRY_ORG" \
            --build-env SENTRY_PROJECT="$SENTRY_PROJECT" \
            --token "$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}

      # D3-CI-03: the ONLY automated check of the security headers this
      # portfolio advertises — the E2E header suite skips off-production
      # and CI runs against a local preview. `vercel deploy --prod` is
      # synchronous (returns after build + alias), so the curl hits the
      # freshly promoted deployment. Also locks D3-SEC-03 in place: fails
      # if script-src ever regresses to 'unsafe-inline'.
      - name: Post-deploy security-header smoke
        run: |
          for i in 1 2 3; do
            HEADERS=$(curl -sI --max-time 15 https://dashti.se/) && break
            echo "curl attempt $i failed; retrying in 10s"; sleep 10
          done
          echo "$HEADERS" | tr -d '\r' > /tmp/headers.txt
          fail=0
          require() {
            if grep -qi "$1" /tmp/headers.txt; then
              echo "[+] $2"
            else
              echo "[-] MISSING: $2"; fail=1
            fi
          }
          require "^content-security-policy:" "Content-Security-Policy present"
          require "^x-content-type-options: *nosniff" "X-Content-Type-Options: nosniff"
          require "^x-frame-options: *deny" "X-Frame-Options: DENY"
          require "^strict-transport-security:" "HSTS present"
          CSP=$(grep -i "^content-security-policy:" /tmp/headers.txt || true)
          SCRIPT_SRC=$(printf '%s' "$CSP" | grep -o "script-src [^;]*" || true)
          if printf '%s' "$SCRIPT_SRC" | grep -q "unsafe-inline"; then
            echo "[-] script-src contains 'unsafe-inline' — D3-SEC-03 regressed"; fail=1
          else
            echo "[+] script-src free of 'unsafe-inline'"
          fi
          exit $fail

  # Deploy backend to Fly.io — gated on backend-quality. Fly's remote builder
  # produces the image from the Dockerfile on each deploy; we just invoke the
  # CLI with a Fly API token.
  deploy-backend:
    runs-on: ubuntu-latest
    needs: [changes, backend-quality]
    if: |
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      needs.changes.outputs.backend == 'true' &&
      needs.backend-quality.result == 'success'
    timeout-minutes: 10
    environment:
      name: production
      url: https://api.dashti.se

    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@fc53c09e1bc3be6f54706524e3b82c4f462f77be # 1.5
        with:
          version: 0.3.207

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        working-directory: ./backend
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
