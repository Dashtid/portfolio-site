name: CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  merge_group:
    branches: [main, master]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  PYTHON_VERSION: '3.13'
  NODE_VERSION: '24'

jobs:
  # Detect which paths changed
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3.0.2
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - 'package*.json'
            backend:
              - 'backend/**'
              - 'requirements*.txt'

  # Frontend Quality Checks
  frontend-quality:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'merge_group'
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npm run --if-present lint

      - name: Run unit tests
        run: npm test -- --run --coverage

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          working-directory: ./frontend
          vite-config-path: ./vite.config.ts

      - name: Build frontend
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  # Backend Quality Checks
  backend-quality:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'merge_group'
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/requirements*.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint with ruff
        run: |
          ruff check .
          ruff format --check .

      - name: Run tests
        run: pytest tests/ -v --cov=app --cov-report=xml --cov-report=term --junitxml=pytest-report.xml || echo "No tests found"

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: MishaKav/pytest-coverage-comment@v1.7.1  # 287292879eaaff04116f36d3eb1a670f6e5df1a4
        with:
          pytest-xml-coverage-path: ./backend/coverage.xml
          junitxml-path: ./backend/pytest-report.xml

  # E2E Testing with Playwright (runs on PRs only)
  e2e-tests:
    runs-on: ubuntu-latest
    needs: [changes, frontend-quality, backend-quality]
    if: github.event_name == 'pull_request' && needs.changes.outputs.frontend == 'true'
    timeout-minutes: 15
    container:
      image: mcr.microsoft.com/playwright:v1.57.0-noble
      options: --ipc=host
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install dependencies
        run: npm ci

      - name: Build frontend for E2E tests
        run: npm run build

      - name: Run Playwright E2E tests
        run: npx playwright test --project=chromium --grep-invert "Bundle Size|defer non-critical"
        env:
          HOME: /root

      - name: Upload Playwright test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/.playwright-report/
          retention-days: 3

      - name: Upload Playwright videos
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-videos
          path: frontend/.test-results/
          retention-days: 3

  # Security Scanning
  security-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Trivy CLI
        # Avoids aquasecurity/trivy-action which had a supply chain compromise in March 2026
        # (75 of 76 version tags force-pushed to serve malicious payloads)
        # Direct binary download from GitHub Releases is unaffected.
        env:
          TRIVY_VERSION: '0.62.0'
        run: |
          curl -sSfL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" -o trivy.tar.gz
          tar -xzf trivy.tar.gz trivy
          sudo mv trivy /usr/local/bin/trivy
          rm trivy.tar.gz

      - name: Run Trivy vulnerability scanner
        run: |
          trivy fs --severity CRITICAL,HIGH --format sarif --output trivy-results.sarif .

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Check for secrets
        uses: trufflesecurity/trufflehog@v3.92.4
        with:
          path: ./
          base: ${{ github.event.before }}
          head: ${{ github.sha }}
          extra_args: --only-verified

  # Dependency Review - blocks PRs with vulnerable dependencies
  dependency-review:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-3.0, AGPL-3.0

  # Lighthouse Performance Audit
  lighthouse:
    runs-on: ubuntu-latest
    needs: [changes, frontend-quality]
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'merge_group'
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: './.github/lighthouse/lighthouserc.json'
          temporaryPublicStorage: true
          uploadArtifacts: true
          runs: 3

  # Deployment (placeholder - configure based on hosting provider)
  deploy:
    runs-on: ubuntu-latest
    needs: [frontend-quality, backend-quality, security-scan]
    if: |
      always() &&
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    timeout-minutes: 10
    environment:
      name: production
      url: https://dashti.se

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download frontend build
        uses: actions/download-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Deploy notification
        run: |
          echo "Deployment step - configure based on hosting provider"
          echo "Options: Azure Static Web Apps, Vercel, Netlify, DigitalOcean, AWS, etc."
          echo "Add deployment steps here"

      # Example: Azure Static Web Apps deployment
      # - name: Deploy to Azure Static Web Apps
      #   uses: Azure/static-web-apps-deploy@v1
      #   with:
      #     azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
      #     repo_token: ${{ secrets.GITHUB_TOKEN }}
      #     action: "upload"
      #     app_location: "/frontend"
      #     api_location: "/backend"
      #     output_location: "dist"
