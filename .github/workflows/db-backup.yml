# Nightly logical backup of the production Postgres (dashti-portfolio-db).
#
# Complements Fly's automatic volume snapshots (5-day retention, restore-
# only-to-new-volume) with portable pg_dump artifacts kept for 30 days.
# Before this workflow existed there was NO durable backup of the DB at
# all — a finding from the 2026-07 full-stack review.
#
# Dumps are age-encrypted before upload (D3-SEC-01, 2026-07-16): this repo
# is PUBLIC, and public-repo artifacts are downloadable by any logged-in
# GitHub account, so plaintext dumps were an open data exposure. The age
# recipient below is a public key — safe to commit; the runner never holds
# decryption capability. The private key lives OFFLINE with the owner
# (password manager). Restore:
#   unzip artifact && age -d -i age-backup-key.txt portfolio-YYYYMMDD.dump.age \
#     > portfolio.dump && pg_restore ...
#
# Required repository secrets:
#   FLY_DB_TOKEN - deploy token: flyctl tokens create deploy -a dashti-portfolio-db
#                  (NOT FLY_API_TOKEN — that one is scoped to the backend
#                  app for deploys; each app gets its own least-privilege
#                  token)
#   DB_PASSWORD  - password of the portfolio_app Postgres user (from the
#                  backend's DATABASE_URL secret)
name: DB Backup

on:
  schedule:
    # 03:30 UTC nightly — after the analytics day rolls over, before CET morning.
    - cron: '30 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@fc53c09e1bc3be6f54706524e3b82c4f462f77be # 1.5

      - name: Install postgresql client
        # pg_dump must be >= the server's major version (17). The runner
        # image only bakes in an older client .deb — the PGDG apt source
        # itself is not configured — so add it before installing.
        run: |
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo gpg --dearmor -o /usr/share/keyrings/pgdg.gpg
          echo "deb [signed-by=/usr/share/keyrings/pgdg.gpg] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list >/dev/null
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client-17 age

      - name: Open proxy to Postgres
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_DB_TOKEN }}
        run: |
          flyctl proxy 15432:5432 -a dashti-portfolio-db &
          # Wait for the tunnel to accept connections
          for i in $(seq 1 30); do
            if pg_isready -h 127.0.0.1 -p 15432 >/dev/null 2>&1; then
              echo "proxy ready"
              exit 0
            fi
            sleep 2
          done
          echo "proxy never became ready" >&2
          exit 1

      - name: Dump database
        env:
          PGPASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          # Versioned path: the runner also ships an older pg_dump, and the
          # Debian wrapper's pick between them is not deterministic.
          /usr/lib/postgresql/17/bin/pg_dump \
            --host 127.0.0.1 --port 15432 \
            --username portfolio_app \
            --dbname dashti_portfolio_backend \
            --format custom \
            --file "portfolio-$(date -u +%Y%m%d).dump"
          ls -la portfolio-*.dump

      - name: Encrypt dump (age, public-key recipient)
        # Plaintext must never reach upload-artifact on this public repo.
        run: |
          age -r age137axkhhga6awtmmpv7lqzkt7fdmlm7pgucqh3rspwysg33whud5skcnkun \
            -o "$(ls portfolio-*.dump).age" "$(ls portfolio-*.dump)"
          shred -u portfolio-*.dump
          ls -la portfolio-*.dump.age

      - name: Upload backup artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pg-backup-${{ github.run_id }}
          path: portfolio-*.dump.age
          retention-days: 30
          if-no-files-found: error
