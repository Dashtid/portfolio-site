name: OpenSSF Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "0 7 * * 1" # weekly, Monday 07:00 UTC
  push:
    branches: ["main"]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload SARIF to code-scanning
      id-token: write # publish_results: true (sigstore signing)
      contents: read

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6
        with:
          persist-credentials: false

      - name: Run analysis
        # SHA must be the action's commit SHA, not the tag-object SHA --
        # api.securityscorecards.dev rejects tag-object SHAs as
        # "imposter commits" during webapp publish verification.
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Publish to api.securityscorecards.dev so the badge in README
          # auto-populates (uses the OIDC token from id-token: write).
          publish_results: true

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v5
        with:
          name: scorecard-sarif
          path: results.sarif
          retention-days: 7

      - name: Upload SARIF to code-scanning
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4
        with:
          sarif_file: results.sarif
