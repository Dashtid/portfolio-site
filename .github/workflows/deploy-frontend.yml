name: Deploy Frontend to Vercel

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

# Quality gates (lint, type-check, unit tests, build smoke-test, e2e) live in
# `ci-cd.yml`'s `frontend-quality` + `e2e-tests` jobs and run in parallel on
# the same push. Branch protection should require them; this workflow only
# ships the bundle.

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        # Pinned (not @latest) but kept current — Vercel rejects deploys from
        # CLI versions below a server-side minimum (44.x started 400ing with
        # "requires version 47.2.2 or later").
        run: npm install -g vercel@53.4.0

      - name: Deploy to Vercel
        # The Vercel CLI does not authenticate from the VERCEL_TOKEN env var on
        # its own ("No existing credentials found ... pass --token") — the token
        # has to be passed explicitly. VERCEL_ORG_ID/PROJECT_ID are still read
        # from the environment to select the project without a linked .vercel dir.
        run: vercel deploy --prod --yes --token "$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
