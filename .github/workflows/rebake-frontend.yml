# D3-INF-02: one-click republish for CMS content edits.
#
# The SSG bake reads api.dashti.se at build time, and the main pipeline's
# deploy-frontend only runs when frontend/** changes — so a CMS edit
# (companies, education, documents) published nowhere until an unrelated
# frontend commit landed. This workflow rebuilds and redeploys the CURRENT
# main from the GitHub Actions UI (Run workflow button) with zero code
# changes.
#
# Deliberately no CI gates here: a rebake deploys the exact SHA that
# already passed the full pipeline; only the baked API content changes.
# The post-deploy smoke still runs so a rebake can never silently ship
# missing security headers.
name: Rebake Frontend (CMS republish)

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: rebake-frontend
  cancel-in-progress: false

jobs:
  rebake:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://dashti.se
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24

      - name: Install Vercel CLI
        run: npm install -g vercel@53.4.0

      # No working-directory: the main pipeline deploys from the repo root
      # (Vercel's Root Directory project setting selects frontend/) — a
      # rebake must upload the identical tree.
      - name: Deploy to Vercel (rebake with fresh CMS content)
        run: |
          vercel deploy --prod --yes \
            --build-env VITE_APP_VERSION="${GITHUB_SHA:0:12}" \
            --build-env VITE_SENTRY_DSN="$VITE_SENTRY_DSN" \
            --build-env SENTRY_AUTH_TOKEN="$SENTRY_AUTH_TOKEN" \
            --build-env SENTRY_ORG="$SENTRY_ORG" \
            --build-env SENTRY_PROJECT="$SENTRY_PROJECT" \
            --token "$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}

      - name: Post-deploy security-header smoke
        run: |
          sleep 5
          HEADERS=$(curl -sI --max-time 15 https://dashti.se/)
          echo "$HEADERS" | tr -d '\r' > /tmp/headers.txt
          fail=0
          grep -qi "^content-security-policy:" /tmp/headers.txt || { echo "[-] CSP missing"; fail=1; }
          SCRIPT_SRC=$(grep -i "^content-security-policy:" /tmp/headers.txt | grep -o "script-src [^;]*" || true)
          if printf '%s' "$SCRIPT_SRC" | grep -q "unsafe-inline"; then
            echo "[-] script-src regressed to unsafe-inline"; fail=1
          else
            echo "[+] headers intact after rebake"
          fi
          exit $fail
