    <!-- Pre-hydration theme. Vue's useDark() only runs after hydration, so
         without this block users with a saved `dark` preference see a
         light-mode flash on every page load. This sets data-theme on <html>
         before first paint, matching what useDark() will compute on the
         client. Storage key + values mirror composables/useTheme.ts.
         NOTE: useDark persists the literal string 'auto' whenever the chosen
         mode equals the system preference (its most common state) — 'auto'
         matches no CSS selector, so anything that isn't exactly
         'dark'/'light' must resolve to the system preference here. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('portfolio-theme')
          var prefersDark =
            window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
          var theme =
            stored === 'dark' || stored === 'light' ? stored : prefersDark ? 'dark' : 'light'
          document.documentElement.setAttribute('data-theme', theme)
        } catch (e) {
          /* localStorage / matchMedia may be unavailable; fall through */
        }
      })()
    </script>
